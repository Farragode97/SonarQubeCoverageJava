name: Build Java application using GitHub Actions
on:
    push:
        branches:
            - master
    workflow_dispatch:
jobs:
    build_java_code:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                 java-version: 17
                 distribution: 'temurin'
            - name: Build with Maven
              run: mvn package
    code_quality_java:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                 java-version: 17
                 distribution: 'temurin'
            - name: build code
              run: mvn package
            - name: sonarqube analysis
#create a step to run sonarqube analysis using the sonarscanner from maven
#analysis will be done on the code and the results will be sent to sonarqube server
              run: mvn sonar:sonar -Dsonar.farragode97=Java-Project -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=Farragode97 -Dsonar.token=${{ secrets.SONAR_TOKEN }}
